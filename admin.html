<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Freelance Work Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-wrapper">
        <header class="admin-header">
            <div class="logo">
                <i class="fa-solid fa-user-shield"></i>
                <h1>Admin Dashboard</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-refresh" onclick="fetchData()">
                    <i class="fa-solid fa-rotate-right"></i> Refresh Data
                </button>
            </div>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <i class="fa-solid fa-users stat-icon"></i>
                <div class="stat-info">
                    <h3>Total Freelancers</h3>
                    <p id="totalCount">0</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-briefcase stat-icon"></i>
                <div class="stat-info">
                    <h3>Top Service</h3>
                    <p id="topService">-</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-star stat-icon"></i>
                <div class="stat-info">
                    <h3>Top Skill</h3>
                    <p id="topSkill">-</p>
                </div>
            </div>
        </section>

        <section class="filters-container">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name or city...">
            </div>
            <div class="filter-box">
                <select id="serviceFilter">
                    <option value="">All Services</option>
                    <!-- Populated dynamically -->
                </select>
            </div>
            <div class="filter-box">
                <select id="skillFilter">
                    <option value="">All Skills</option>
                    <!-- Populated dynamically -->
                </select>
            </div>
        </section>

        <section class="table-container">
            <div id="loading" class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading Data...
            </div>
            <table class="data-table" id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Place</th>
                        <th>WhatsApp</th>
                        <th>Services</th>
                        <th>Skills</th>
                        <th>Links</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data populated here -->
                </tbody>
            </table>
        </section>
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
</body>
</html>
